<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Minecraft Fun!</title>
<script src="js/auth.js"></script>
<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    width: 90%;
    max-width: 450px;
}

h1 {
    text-align: center;
    color: #4ade80;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

p {
    text-align: center;
    margin-top: 20px;
}

a {
    color: #4ade80;
}

.info {
    background: rgba(255,255,255,0.08);
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 0.95rem;
}
</style>
</head>
<body>

<div class="container">
    <h1>Staff Sign In</h1>

    <div class="info">
        Default Admin Login:<br>
        Username: <strong>admin</strong><br>
        Password: <strong>admin123</strong>
    </div>

    <input id="username" placeholder="Username">

    <input id="password" type="password" placeholder="Password">

    <button onclick="loginUser()">Sign In</button>

    <p>Need staff access? <a href="signup.html">Apply Here</a></p>
</div>

<script>
function loginUser() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let result = login(username, password);

    if (result.success) {
        window.location.href = "dashboard.html";
    } else {
        alert(result.message);
    }
}
</script>

</body>
</html>
